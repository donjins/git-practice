<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background: #0a192f;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        .nav-links a:hover {
            color: #64ffda;
        }

        /* Content */
        .content {
            padding: 50px;
            text-align: center;
            background: #f1f1f1;
            min-height: 100vh;
        }

        /* Services */
        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }
    </style>

</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <h2 class="logo">MySite</h2>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="first.html">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Services Page -->
    <section class="content">
        <h1>Our Services</h1>
        <div class="services">

            <div class="card">
                <h3>Web Development</h3>
                <p>We build modern websites</p>
            </div>

            <div class="card">
                <h3>UI/UX Design</h3>
                <p>Beautiful and user-friendly designs</p>
            </div>

            <div class="card">
                <h3>Maintenance</h3>
                <p>We maintain and support your apps</p>
            </div>

        </div>
    </section>

</body>
</html>
